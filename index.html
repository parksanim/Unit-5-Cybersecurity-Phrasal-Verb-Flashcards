<div class="phone-frame">

        </div>

          </div>

      <button class="btn-flip" onclick="flipCard()">&#9654; FLIP</button>
      <div class="nav-row">
        <button class="btn-nav" onclick="prevCard()">&#9664; PREV</button>
        <button class="btn-nav" onclick="nextCard()">NEXT &#9654;</button>
      </div>

<script>
const cards = [
  { term: "Snoop around", definition: "To look through a system or files secretly." },
  { term: "Piggyback on", definition: "To use someone else's active connection to gain access." },
  { term: "Fend off", definition: "To defend against or repel an attack." },
  { term: "Farm out", definition: "To outsource a task to an external company." },
  { term: "Wipe out", definition: "To completely erase or destroy data or a system." }
];
let current = 0;
let flipped = false;
// --- Audio Context (created on first interaction to satisfy browser policy) ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
// Steamy whoosh: filtered noise burst with pitch sweep
function playWhoosh() {
  const ctx = getAudioCtx();
  const duration = 0.9;
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  // Bandpass filter sweeping upward then down
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(200, ctx.currentTime);
  filter.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.25);
  filter.frequency.linearRampToValueAtTime(400, ctx.currentTime + duration);
  filter.Q.value = 1.5;
  // Low-pass to soften
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 2400;
  // Gain envelope: quick attack, slow decay
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.05);
  gainNode.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.3);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  // Add a subtle low hiss layer
  const hissBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const hissData = hissBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) hissData[i] = (Math.random() * 2 - 1) * 0.15;
  const hissSource = ctx.createBufferSource();
  hissSource.buffer = hissBuffer;
  const hissGain = ctx.createGain();
  hissGain.gain.setValueAtTime(0.3, ctx.currentTime);
  hissGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  hissSource.connect(hissGain);
  hissGain.connect(ctx.destination);
  hissSource.start();
  hissSource.stop(ctx.currentTime + duration);
  source.connect(filter);
  filter.connect(lp);
  lp.connect(gainNode);
  gainNode.connect(ctx.destination);
  source.start();
  source.stop(ctx.currentTime + duration);
}
// Metal clank: two short sine tones with fast decay + noise transient
function playClank() {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Main metallic clank tone
  [220, 440, 660].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq * (1 + i * 0.02), now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.15);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.18 / (i + 1), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  });
  // Noise transient (the "impact" click)
  const impactSize = ctx.sampleRate * 0.08;
  const impactBuf = ctx.createBuffer(1, impactSize, ctx.sampleRate);
  const impactData = impactBuf.getChannelData(0);
  for (let i = 0; i < impactSize; i++) impactData[i] = (Math.random() * 2 - 1);
  const impactSrc = ctx.createBufferSource();
  impactSrc.buffer = impactBuf;
  const impactFilter = ctx.createBiquadFilter();
  impactFilter.type = 'highpass';
  impactFilter.frequency.value = 800;
  const impactGain = ctx.createGain();
  impactGain.gain.setValueAtTime(0.4, now);
  impactGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  impactSrc.connect(impactFilter);
  impactFilter.connect(impactGain);
  impactGain.connect(ctx.destination);
  impactSrc.start(now);
  impactSrc.stop(now + 0.08);
}
function showCard() {
  document.getElementById('termText').textContent = cards[current].term;
  document.getElementById('defText').textContent = cards[current].definition;
  document.getElementById('counter').textContent = `Card ${current + 1} of ${cards.length}`;
  // Reset flip
  flipped = false;
  document.getElementById('flipInner').classList.remove('flipped');
}
function flipCard() {
  playWhoosh();
  flipped = !flipped;
  document.getElementById('flipInner').classList.toggle('flipped', flipped);
}
function nextCard() {
  playClank();
  current = (current + 1) % cards.length;
  showCard();
}
function prevCard() {
  playClank();
  current = (current - 1 + cards.length) % cards.length;
  showCard();
}
showCard();
</script>
